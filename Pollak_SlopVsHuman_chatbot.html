<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Style Coach — Writing Against AI Slop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #1a1410;
    --cream:     #f5f0e8;
    --warm:      #ede8de;
    --gold:      #c4a882;
    --dark-gold: #6b5030;
    --muted:     #5a4f44;
    --rule:      #d5ccc0;
    --white:     #ffffff;
    --green-bg:  #eaf4ee;
    --green-bdr: #4a8c5c;
    --green-txt: #1a3a28;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    background: var(--ink);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 3px solid var(--gold);
  }

  .header-left { display: flex; align-items: baseline; gap: 14px; }

  .header-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: -0.01em;
  }

  .header-title em { font-style: italic; color: var(--gold); }

  .header-sub {
    font-size: 0.78rem;
    color: #a09080;
    font-style: italic;
  }

  .mode-pills {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .mode-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a09080;
    margin-right: 4px;
  }

  .pill {
    padding: 5px 14px;
    border-radius: 2px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #444;
    background: none;
    color: #a09080;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .pill:hover { border-color: var(--gold); color: var(--gold); }
  .pill.active { background: var(--gold); border-color: var(--gold); color: var(--ink); }

  /* ── Mode banner ─────────────────────────────────────── */
  .mode-banner {
    background: var(--warm);
    border-bottom: 1px solid var(--rule);
    padding: 10px 28px;
    font-size: 0.83rem;
    color: var(--muted);
    line-height: 1.5;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mode-banner strong { color: var(--ink); }

  .genre-select {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .genre-select select {
    padding: 4px 10px;
    border: 1.5px solid var(--rule);
    border-radius: 2px;
    background: var(--white);
    font-family: 'Source Serif 4', serif;
    font-size: 0.8rem;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }

  .genre-select select:focus { border-color: var(--dark-gold); }

  /* ── Chat area ───────────────────────────────────────── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }

  /* ── Messages ────────────────────────────────────────── */
  .message {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.assistant { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  .message.user .avatar { background: var(--dark-gold); color: var(--cream); }
  .message.assistant .avatar { background: var(--ink); color: var(--gold); }

  .bubble {
    padding: 14px 18px;
    line-height: 1.75;
    font-size: 0.94rem;
    max-width: 680px;
  }

  .message.user .bubble {
    background: var(--ink);
    color: var(--cream);
    border-radius: 2px 2px 0 2px;
  }

  .message.assistant .bubble {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 0 2px 2px 2px;
    color: var(--ink);
  }

  /* Markdown-style formatting inside assistant bubbles */
  .bubble p { margin-bottom: 10px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 700; color: var(--ink); }
  .bubble em { font-style: italic; }

  .bubble .feature-tag {
    display: inline-block;
    background: var(--warm);
    border: 1px solid var(--gold);
    color: var(--dark-gold);
    font-size: 0.78rem;
    font-weight: 600;
    padding: 1px 8px;
    border-radius: 2px;
    margin: 1px 2px;
    font-family: 'Source Serif 4', serif;
    letter-spacing: 0.02em;
  }

  .bubble .example-block {
    background: var(--cream);
    border-left: 3px solid var(--gold);
    padding: 10px 14px;
    margin: 10px 0;
    font-style: italic;
    font-size: 0.91rem;
    line-height: 1.7;
    color: #2a201a;
  }

  .bubble .model-block {
    background: var(--green-bg);
    border-left: 3px solid var(--green-bdr);
    padding: 10px 14px;
    margin: 10px 0;
    font-style: italic;
    font-size: 0.91rem;
    line-height: 1.7;
    color: var(--green-txt);
  }

  .bubble .model-block-label {
    font-style: normal;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green-bdr);
    display: block;
    margin-bottom: 5px;
  }

  .bubble ul, .bubble ol {
    padding-left: 20px;
    margin: 8px 0;
  }

  .bubble li { margin-bottom: 5px; line-height: 1.65; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 0 2px 2px 2px;
    width: fit-content;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: typing 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* ── Input bar ───────────────────────────────────────── */
  .input-bar {
    flex-shrink: 0;
    border-top: 2px solid var(--gold);
    background: var(--white);
    padding: 16px 28px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  textarea {
    width: 100%;
    padding: 12px 16px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.94rem;
    line-height: 1.6;
    border: 1.5px solid var(--rule);
    border-radius: 2px;
    background: var(--cream);
    color: var(--ink);
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 180px;
    overflow-y: auto;
    transition: border-color 0.15s;
    display: block;
  }

  textarea:focus { border-color: var(--dark-gold); }
  textarea::placeholder { color: #9a9080; font-style: italic; }

  .send-btn {
    padding: 12px 22px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 2px;
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.03em;
    flex-shrink: 0;
    height: 48px;
  }

  .send-btn:hover:not(:disabled) { background: var(--dark-gold); }
  .send-btn:active:not(:disabled) { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .new-exercise-btn {
    padding: 12px 18px;
    background: none;
    color: var(--dark-gold);
    border: 1.5px solid var(--dark-gold);
    border-radius: 2px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    height: 48px;
    letter-spacing: 0.02em;
  }

  .new-exercise-btn:hover:not(:disabled) { background: var(--dark-gold); color: var(--cream); }
  .new-exercise-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Responsive ──────────────────────────────────────── */
  @media (max-width: 640px) {
    header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 18px; }
    .mode-pills { margin-top: 4px; }
    .header-sub { display: none; }
    .chat-area { padding: 16px 14px; }
    .input-bar { padding: 12px 14px; }
    .bubble { font-size: 0.89rem; max-width: 90vw; }
    .genre-select { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-title">AI Style <em>Coach</em></div>
    <div class="header-sub">Writing against AI slop · Calvin Pollak, UW</div>
  </div>
  <div class="mode-pills">
    <span class="mode-label">Mode:</span>
    <button class="pill active" id="pill-exercise" onclick="setMode('exercise')">Guided Exercises</button>
    <button class="pill" id="pill-practice" onclick="setMode('practice')">My Own Writing</button>
  </div>
</header>

<div class="mode-banner" id="mode-banner">
  <span id="banner-text"><strong>Guided Exercise Mode:</strong> The coach will give you an exercise. Work through it, then get detailed feedback. Type "next" for a new exercise, or switch to "My Own Writing" to get feedback on your own text.</span>
  <div class="genre-select" id="genre-select-wrap">
    <span>Genre focus:</span>
    <select id="genre-select" onchange="onGenreChange()">
      <option value="any">Any genre</option>
      <option value="cover">Cover letters</option>
      <option value="instructions">Instructional documents</option>
      <option value="proposals">Proposals</option>
    </select>
  </div>
</div>

<div class="chat-area" id="chat-area"></div>

<div class="input-bar">
  <div class="input-wrap">
    <textarea
      id="user-input"
      placeholder="Type your response here…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
  </div>
  <button class="new-exercise-btn" id="new-btn" onclick="requestNewExercise()" title="Get a new exercise">New exercise</button>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">Send →</button>
</div>

<script>
// ── State ────────────────────────────────────────────────
let mode = 'exercise';
let genre = 'any';
let conversationHistory = [];
let isLoading = false;

// ── System prompts ────────────────────────────────────────
const SYSTEM_EXERCISE = `You are a writing coach working with Technical and Professional Communication students on recognising and revising "AI slop style": the distinctive grammatical and rhetorical patterns produced by instruction-tuned large language models. Your teaching draws on two research studies:

- Markey et al. (2024) found that ChatGPT-generated text is significantly more informationally dense than even professional academic writing, scoring very low on the dimension that captures hedges, modals of possibility, and features that keep writing dialogically open to other perspectives. The result is prose that is assertive, noun-heavy, and closed.
- Reinhart et al. (2025) found that instruction-tuned LLMs use present participial clauses at 2-5x the human rate, nominalizations at 1.5-2x the human rate, and avoid clausal co-ordination relative to human writers. These patterns persist across genres and model sizes.

THE SIX KEY FEATURES you teach (always explain these when they appear):

1. NOMINALIZATIONS: Verbs and adjectives converted into nouns. Examples: "the completion of" (completing), "the development of" (developing), "the provision of" (providing), "utilization" (use), "implementation" (implementing). These compress action into abstract nouns, removing agency and making prose dense.

2. PRESENT PARTICIPIAL CLAUSES: Clauses beginning with a present participle used to modify or extend a noun phrase. Examples: "a programme facilitating the development of skills", "evidence linking exposure to disrupted rhythms", "strategies integrating residential and commercial functions". These stack information into noun phrases in ways humans rarely do.

3. ATTRIBUTIVE NOUN STACKING / DENSE NOUN PHRASES: Long chains of nouns used as modifiers: "evidence-based stakeholder engagement framework", "long-term tolerability profiles", "cross-functional team collaboration initiatives". These pack meaning densely but reduce readability and feel impersonal.

4. HEDGES AND MODALS OF POSSIBILITY (absent in AI slop style, present in more human writing): Words and phrases that acknowledge uncertainty: "might", "could", "seems to", "appears to", "suggests", "I believe", "it is worth noting", "typically", "in most cases". LLM-generated text tends to assert without qualification, while human writers hedge claims about uncertain futures and complex situations.

5. CLAUSAL CO-ORDINATION (absent in AI slop style, present in more human writing): Human writers connect ideas through co-ordinating conjunctions: "and this means that", "and so", "though it is worth noting that", "which could suggest that". AI slop style compresses these relationships into noun phrases instead, and the explicit logical connections get lost.

6. AGENTLESS PASSIVES: Constructions where the actor is removed: "the form should be completed", "guidelines should be developed", "errors were identified". These obscure who does what, which is especially problematic in instructional writing. Note that GPT-4o actually uses the agentless passive at roughly half the human rate, but it pairs this with so much nominalization that a different kind of impersonality results.

GENRE-SPECIFIC KNOWLEDGE:

COVER LETTERS: Nominalizations push the writer out of the sentence, and this is especially harmful in cover letters. "My demonstrated expertise in stakeholder engagement" hides the person; "I have spent five years managing stakeholder relationships" restores them. Hedging is appropriate for future claims: "I believe I would contribute" is self-aware, not weak. The first person "I" should be the agent of action throughout.

INSTRUCTIONAL DOCUMENTS: AI slop style obscures who does what and when. "Completion of setup requires submission of credentials" should be "To complete setup, you need to submit your credentials." Imperative verbs ("click", "enter", "check") and second-person address ("you") make instructions clear. Hedging matters practically here too: "The email should arrive within two minutes, though it may take longer" sets honest expectations.

PROPOSALS: Proposals make claims about uncertain futures, so calibrated hedging is intellectually honest and often more persuasive, not weaker. "This will result in a 30% reduction" is overconfident; "Evidence suggests this could reduce costs by around 30%, though this would depend on..." is more credible. Over-hedging is also a problem; avoid stacking so many qualifications that the argument collapses.

EXERCISE TYPES (use all of these and vary them):

IDENTIFICATION: Present a passage (3-5 sentences) and ask the student to identify whether it is AI slop style or more human style, and to name the specific features that gave it away.

TRANSFORMATION (AI slop to human): Give an AI slop style passage and ask the student to rewrite it in a more human style. Specify the key moves: unpack nominalizations into verbs, restore explicit agents, add hedges, use clausal co-ordination.

TRANSFORMATION (human to AI slop): Give a human-style passage and ask the student to rewrite it in AI slop style by nominalizing verbs, removing hedges, and converting co-ordinating clauses into participial phrases. This reverse direction builds recognition.

SPOT AND FIX: Give a full paragraph in AI slop style. Ask the student to (1) identify all the AI slop features they can find, listing them by name, and then (2) rewrite the paragraph in a more human style.

HEDGING CALIBRATION: Give three versions of the same claim (one overconfident, one appropriately hedged, one over-hedged) and ask the student to rank them and explain why.

YOUR FEEDBACK APPROACH: always do all of the following:
1. Start by acknowledging something the student got right, and be specific rather than just saying "good work."
2. Name every feature by its correct term (nominalization, participial clause, etc.) when you point it out.
3. Quote the specific word or phrase from the student's text or the exercise text when explaining a feature.
4. Explain why the feature creates a problem in this context (impersonality, obscured agency, overconfidence, etc.).
5. Bring in Markey et al. (2024) or Reinhart et al. (2025) where the research finding is directly relevant; work it in naturally rather than as a lecture.
6. For transformation exercises, provide a model answer and explain the key choices made.
7. End each round by checking whether the student has questions or is ready to move on.

YOUR TONE: Think of yourself as a writing instructor talking with a student during office hours. You are genuinely interested in what they are working on, and your feedback reflects that. Be kind and specific in equal measure. When something is working, say so and say why. When something is not, explain it in a way that actually helps rather than just identifying the problem. You do not need to perform expertise or enthusiasm; just engage with the writing as it is. Avoid being breezy or sycophantic, but also avoid the "just calling it like I see it" energy that can feel dismissive. The goal is for students to feel like they are learning alongside someone who cares about good writing, not being assessed by someone who already has all the answers. Vary your response structure between prose and lists depending on what the feedback calls for.

Do not use em dashes in your responses. If you need to connect two ideas, use a conjunction, a semicolon, or parentheses instead.

PACING: One exercise at a time. Wait for the student's response before giving your full feedback. If a student types "next" or "another one" or similar, give them a new exercise without lengthy preamble.

OPENING: When the conversation begins, briefly introduce yourself (2-3 sentences), then present the first exercise immediately. Do not ask the student what they want to do first; just start with an identification exercise to warm up.`

const SYSTEM_PRACTICE = `You are a writing coach working with Technical and Professional Communication students on recognising and revising "AI slop style": the distinctive grammatical and rhetorical patterns produced by instruction-tuned large language models. Your teaching draws on two research studies:

- Markey et al. (2024) found that ChatGPT-generated text is significantly more informationally dense than even professional academic writing, scoring very low on the dimension that captures hedges, modals of possibility, and features that keep writing dialogically open. The result is prose that is assertive, noun-heavy, and closed.
- Reinhart et al. (2025) found that instruction-tuned LLMs use present participial clauses at 2-5x the human rate, nominalizations at 1.5-2x the human rate, and avoid clausal co-ordination relative to human writers.

THE SIX KEY FEATURES you look for and teach (always name and explain these):

1. NOMINALIZATIONS: Verbs/adjectives converted to nouns: "completion", "development", "provision", "utilization", "implementation", "the delivery of", "the acquisition of". Ask: can this noun be turned back into a verb with an explicit subject?

2. PRESENT PARTICIPIAL CLAUSES: Clauses beginning with a present participle modifying a noun: "a strategy facilitating X", "evidence linking X to Y", "mechanisms supporting the development of Z". These stack information in ways humans rarely do.

3. DENSE NOUN PHRASES / ATTRIBUTIVE NOUN STACKING: Long chains of modifying nouns: "evidence-based stakeholder communication framework", "cross-functional team development initiatives".

4. ABSENT HEDGES AND MODALS: Claims made with certainty that should be qualified. "Will result in", "guarantees", "demonstrates" often want to become "might", "could", "seems to suggest."

5. ABSENT CLAUSAL CO-ORDINATION: Logical relationships compressed into noun phrases instead of stated explicitly through "and", "so", "though", "which means that", etc.

6. AGENTLESS PASSIVES: Constructions that hide who acts: "adjustments may be required", "the form should be completed". Ask: who does this, and can we say so?

GENRE-SPECIFIC FOCUS:

COVER LETTERS: Look especially for nominalizations that push out the first-person "I". "My demonstrated commitment to the delivery of high-quality outputs" should become "I have consistently worked to deliver high-quality work." Restore the writer as an agent. Hedging is appropriate for future claims.

INSTRUCTIONAL DOCUMENTS: Look for nominalized actions ("completion of setup" should become "complete the setup"), missing agents, and absent hedging that sets unrealistic expectations. The reader should always know who does what, when, and under what conditions.

PROPOSALS: Balance matters here. Flag both overconfidence (missing hedges on future claims) and over-hedging (so many qualifications the argument collapses). Help the student find the calibrated middle.

YOUR ANALYSIS APPROACH: when a student shares their writing, always:
1. Open with a brief, honest overall impression (1-2 sentences).
2. Go through the AI slop features present, naming each by its correct term, quoting the specific phrase, and explaining why it creates a problem in this genre and context.
3. Highlight what is already working well in human-style terms, and be specific rather than generic.
4. If there are many issues, identify the 2-3 most important ones to tackle first rather than overwhelming the student.
5. Offer a revised version of one or two of the most problematic sentences as a model, explaining your choices.
6. Invite the student to try revising and return for another round of feedback.
7. Bring in Markey et al. (2024) or Reinhart et al. (2025) where directly relevant; work it in naturally rather than as a lecture.

If the student has not yet shared any writing, invite them to paste in a passage (a paragraph or two is ideal) and ask them to mention what genre it is and what it is for.

YOUR TONE: Think of yourself as a writing instructor talking with a student who has brought in a draft. You are genuinely interested in what they are working on. Be kind and specific in equal measure. When something is working, name it and say why. When something is not, explain it in a way that actually helps rather than just identifying the problem. You do not need to perform expertise; the quality of your feedback will show. Avoid the "just calling it like I see it" energy that can feel dismissive. The goal is for students to feel like they are working through something with someone who cares, not being evaluated from a distance. Vary your response structure between prose and lists depending on what the situation calls for.

Do not use em dashes in your responses. If you need to connect two ideas, use a conjunction, a semicolon, or parentheses instead.`

// ── Mode switching ────────────────────────────────────────
function setMode(newMode) {
  mode = newMode;
  document.getElementById('pill-exercise').classList.toggle('active', newMode === 'exercise');
  document.getElementById('pill-practice').classList.toggle('active', newMode === 'practice');

  const bannerText = document.getElementById('banner-text');
  const genreWrap = document.getElementById('genre-select-wrap');
  const newBtn = document.getElementById('new-btn');

  if (newMode === 'exercise') {
    bannerText.innerHTML = '<strong>Guided Exercise Mode:</strong> The coach will give you an exercise. Work through it, then get detailed feedback. Type "next" for a new exercise.';
    genreWrap.style.display = 'flex';
    newBtn.style.display = 'block';
  } else {
    bannerText.innerHTML = '<strong>My Own Writing Mode:</strong> Paste in a paragraph or two from something you\'re working on — a cover letter, instructions, a proposal — and the coach will analyse it and help you revise.';
    genreWrap.style.display = 'none';
    newBtn.style.display = 'none';
  }

  // Reset and re-open with appropriate greeting
  conversationHistory = [];
  clearChat();
  startConversation();
}

function onGenreChange() {
  genre = document.getElementById('genre-select').value;
}

// ── Chat rendering ────────────────────────────────────────
function clearChat() {
  document.getElementById('chat-area').innerHTML = '';
}

function appendMessage(role, htmlContent) {
  const area = document.getElementById('chat-area');
  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'You' : 'AC';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = htmlContent;

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  area.appendChild(wrapper);
  area.scrollTop = area.scrollHeight;
  return bubble;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const wrapper = document.createElement('div');
  wrapper.className = 'message assistant';
  wrapper.id = 'typing-wrapper';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AC';

  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  wrapper.appendChild(avatar);
  wrapper.appendChild(indicator);
  area.appendChild(wrapper);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-wrapper');
  if (el) el.remove();
}

// ── Text formatting ───────────────────────────────────────
function formatResponse(text) {
  // Convert markdown-style formatting to HTML
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Feature tags: wrap [FEATURE: text] in a tag span
  text = text.replace(/\[FEATURE: (.+?)\]/g, '<span class="feature-tag">$1</span>');
  // Example blocks: lines starting with ">"
  text = text.replace(/^&gt; (.+)$/gm, '<div class="example-block">$1</div>');
  // Model answer blocks: lines starting with "MODEL:"
  text = text.replace(/MODEL:\n([\s\S]+?)(?=\n\n|\n[A-Z]|$)/g, (match, content) => {
    return `<div class="model-block"><span class="model-block-label">Model Answer</span>${content.trim()}</div>`;
  });
  // Unordered lists
  text = text.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Numbered lists
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Paragraphs: split on double newlines
  const paras = text.split(/\n\n+/);
  return paras.map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<ul>') || p.startsWith('<div class="') || p.startsWith('<li>')) return p;
    // Wrap consecutive <li> items
    if (p.includes('<li>')) return '<ul>' + p + '</ul>';
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
}

// ── API call ──────────────────────────────────────────────
async function callClaude(messages, systemPrompt) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': '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',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: messages
    })
  });
  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const data = await response.json();
  return data.content.map(b => b.text || '').join('');
}

// ── Conversation logic ────────────────────────────────────
async function startConversation() {
  setLoading(true);
  showTyping();

  const systemPrompt = mode === 'exercise' ? SYSTEM_EXERCISE : SYSTEM_PRACTICE;

  let openingInstruction;
  if (mode === 'exercise') {
    const genreLabel = {
      any: 'any genre (cover letters, instructional documents, or proposals)',
      cover: 'cover letters',
      instructions: 'instructional documents',
      proposals: 'proposals'
    }[genre];
    openingInstruction = `Please introduce yourself briefly (2–3 sentences), then immediately present an identification exercise. The genre focus is: ${genreLabel}. Do not ask what the student wants to do — just start the exercise.`;
  } else {
    openingInstruction = `Please introduce yourself briefly (2–3 sentences) and invite the student to paste in their writing. Mention that a paragraph or two is ideal, and that they should say what genre it is.`;
  }

  conversationHistory = [{ role: 'user', content: openingInstruction }];

  try {
    const reply = await callClaude(conversationHistory, systemPrompt);
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    appendMessage('assistant', formatResponse(reply));
  } catch (err) {
    removeTyping();
    appendMessage('assistant', '<p>Sorry, there was a problem connecting to the coach. Please check your connection and try again.</p>');
  }

  setLoading(false);
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  autoResize(input);

  appendMessage('user', `<p>${escapeHtml(text)}</p>`);
  conversationHistory.push({ role: 'user', content: text });

  setLoading(true);
  showTyping();

  const systemPrompt = mode === 'exercise' ? SYSTEM_EXERCISE : SYSTEM_PRACTICE;

  try {
    const reply = await callClaude(conversationHistory, systemPrompt);
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    appendMessage('assistant', formatResponse(reply));
  } catch (err) {
    removeTyping();
    appendMessage('assistant', '<p>Sorry, there was a problem connecting. Please try again.</p>');
  }

  setLoading(false);
}

async function requestNewExercise() {
  if (isLoading) return;

  const genreLabel = {
    any: 'any genre (cover letters, instructional documents, or proposals)',
    cover: 'cover letters',
    instructions: 'instructional documents',
    proposals: 'proposals'
  }[genre];

  const prompt = `Please give me a new exercise. Genre focus: ${genreLabel}. Choose a different exercise type from the last one, and if possible a different genre. Go straight to the exercise — no lengthy preamble.`;

  conversationHistory.push({ role: 'user', content: prompt });
  appendMessage('user', `<p><em>Requesting a new exercise…</em></p>`);

  setLoading(true);
  showTyping();

  const systemPrompt = mode === 'exercise' ? SYSTEM_EXERCISE : SYSTEM_PRACTICE;

  try {
    const reply = await callClaude(conversationHistory, systemPrompt);
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    appendMessage('assistant', formatResponse(reply));
  } catch (err) {
    removeTyping();
    appendMessage('assistant', '<p>Sorry, there was a problem. Please try again.</p>');
  }

  setLoading(false);
}

// ── Utilities ─────────────────────────────────────────────
function setLoading(val) {
  isLoading = val;
  document.getElementById('send-btn').disabled = val;
  document.getElementById('new-btn').disabled = val;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

// ── Init ──────────────────────────────────────────────────
startConversation();
</script>
